<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taunting</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
            color: #f0c040;
            text-transform: uppercase;
        }
        .gif-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        .gif-item {
            background: #16213e;
            border-radius: 10px;
            padding: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        .gif-item:hover {
            transform: scale(1.05);
        }
        .gif-item img {
            display: block;
            max-width: 150px;
            max-height: 150px;
        }
        .gif-label {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
